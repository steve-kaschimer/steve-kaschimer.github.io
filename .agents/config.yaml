framework:
  version: 0.13.0
  source: github.com/Slalom/ai-sdlc-framework
  auto_update: false
  spec_kit:
    version: 0.8.11
    release_pinned: true
agents:
  enabled:
    - claude-code
    - cursor
    - github-copilot
    - cline
    - codex
    - kiro
commands:
  mode: generated
  source: .specify/templates/commands
spec_kit:
  integration: codex
  preset: aisdlc-core
  extensions:
    - git
    - aisdlc-context
  community_extensions:
    - id: bugfix
      slug: spec-kit-bugfix
      display_name: Bugfix Workflow
      source: https://github.com/Quratulain-bilal/spec-kit-bugfix/archive/refs/tags/v1.0.0.zip
      documentation: https://github.com/Quratulain-bilal/spec-kit-bugfix/blob/main/README.md
      curated: true
      extension_id: bugfix
    - id: issue
      slug: spec-kit-issue
      display_name: GitHub Issue Import
      source: https://github.com/aaronrsun/spec-kit-issue/archive/refs/tags/v1.0.0.zip
      documentation: https://github.com/aaronrsun/spec-kit-issue/blob/main/README.md
      curated: true
      extension_id: issue
    - id: iterate
      slug: spec-kit-iterate
      display_name: Iterate
      source: https://github.com/imviancagrace/spec-kit-iterate/archive/refs/tags/v2.0.0.zip
      documentation: https://github.com/imviancagrace/spec-kit-iterate/blob/main/README.md
      curated: true
      extension_id: iterate
  workflows:
    - speckit
    - aisdlc-loop
