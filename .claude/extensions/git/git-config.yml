# Git Branching Workflow Extension Configuration

# Branch numbering strategy: "sequential" (001, 002, ...) or "timestamp" (YYYYMMDD-HHMMSS)
branch_numbering: sequential

# Commit message used by `git commit` during repository initialization
init_commit_message: "[SDD] Initial commit"

# Auto-commit before/after core commands.
# Set "default" to enable for all commands, then override per-command.
# Each key can be true/false. Message is customizable per-command.
auto_commit:
  default: false
  before_clarify:
    enabled: false
    message: "[SDD] Save progress before clarification"
  before_plan:
    enabled: false
    message: "[SDD] Save progress before planning"
  before_tasks:
    enabled: false
    message: "[SDD] Save progress before task generation"
  before_implement:
    enabled: false
    message: "[SDD] Save progress before implementation"
  before_checklist:
    enabled: false
    message: "[SDD] Save progress before checklist"
  before_analyze:
    enabled: false
    message: "[SDD] Save progress before analysis"
  before_taskstoissues:
    enabled: false
    message: "[SDD] Save progress before issue sync"
  after_constitution:
    enabled: true
    message: "[SDD] Add project constitution"
  after_specify:
    enabled: true
    message: "[SDD] Add specification"
  after_clarify:
    enabled: true
    message: "[SDD] Clarify specification"
  after_plan:
    enabled: true
    message: "[SDD] Add implementation plan"
  after_tasks:
    enabled: true
    message: "[SDD] Add tasks"
  after_implement:
    enabled: true
    message: "[SDD] Implementation progress"
  after_checklist:
    enabled: true
    message: "[SDD] Add checklist"
  after_analyze:
    enabled: true
    message: "[SDD] Add analysis report"
  after_taskstoissues:
    enabled: true
    message: "[SDD] Sync tasks to issues"
