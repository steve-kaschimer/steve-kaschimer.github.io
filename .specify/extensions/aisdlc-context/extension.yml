schema_version: "1.0"

extension:
  id: "aisdlc-context"
  name: "AI-SDLC Context Extension"
  version: "0.6.0"
  description: "Adds AI-SDLC bootstrap, preflight, triage, mockup, and promotion capabilities for context-aware Spec Kit workflows."
  author: "AI-SDLC Framework"
  license: "MIT"

requires:
  speckit_version: ">=0.8.11"

provides:
  commands:
    - name: "speckit.aisdlc.bootstrap"
      file: "commands/speckit.aisdlc.bootstrap.md"
      description: "Bootstrap durable AI-SDLC context for an existing codebase."
    - name: "speckit.aisdlc.preflight"
      file: "commands/speckit.aisdlc.preflight.md"
      description: "Build a concise repo-specific context briefing before core Spec Kit phases."
    - name: "speckit.aisdlc.triage"
      file: "commands/speckit.aisdlc.triage.md"
      description: "Analyze raw intake against repo context and related work, then recommend the smallest justified next action."
    - name: "speckit.aisdlc.mockup"
      file: "commands/speckit.aisdlc.mockup.md"
      description: "Generate static UI mockups and handoff notes for UI-relevant stories in the active Spec Kit feature spec."
    - name: "speckit.aisdlc.promote"
      file: "commands/speckit.aisdlc.promote.md"
      description: "Capture durable learning and recommend what should be promoted into project docs."

hooks:
  before_specify:
    command: "speckit.aisdlc.preflight"
    optional: false
    description: "Review the constitution and project context before writing the specification."
  before_plan:
    command: "speckit.aisdlc.preflight"
    optional: false
    description: "Review the constitution and project context before planning."
  before_implement:
    command: "speckit.aisdlc.preflight"
    optional: false
    description: "Review the constitution, plan, and project docs before implementation."
  after_plan:
    command: "speckit.aisdlc.promote"
    optional: true
    prompt: "Review durable planning decisions and record AI-SDLC promotion recommendations?"
    description: "Record planned promotion candidates after planning."
  after_specify:
    command: "speckit.aisdlc.mockup"
    optional: true
    prompt: "Generate static UI mockups for UI-relevant stories in the feature spec?"
    description: "Create reviewable UI mockups and handoff notes after specification."
  after_implement:
    command: "speckit.aisdlc.promote"
    optional: true
    prompt: "Review implementation changes and recommend what should be promoted into durable docs?"
    description: "Recommend promotion after implementation."

tags:
  - "aisdlc"
  - "bootstrap"
  - "context"
  - "docs"
  - "mockup"
  - "triage"
  - "promotion"
  - "ui"
