schema_version: "1.0"
workflow:
  id: "aisdlc-loop"
  name: "AI-SDLC Context Loop"
  version: "0.5.0"
  author: "AI-SDLC Framework"
  description: "Runs specify -> clarify -> plan -> tasks -> analyze -> implement -> checklist with AI-SDLC context hooks and promotion review."

requires:
  speckit_version: ">=0.8.11"
  integrations:
    any: ["claude", "codex", "copilot", "cursor-agent", "kiro-cli"]

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe what you want to build"
  integration:
    type: string
    default: "codex"
    prompt: "Integration to use (for example: codex, claude, copilot)"

steps:
  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-spec
    type: gate
    message: "Review the generated spec before clarification."
    options: [approve, reject]
    on_reject: abort

  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-clarifications
    type: gate
    message: "Review the clarified spec before planning."
    options: [approve, reject]
    on_reject: abort

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-plan
    type: gate
    message: "Review the implementation plan before generating tasks."
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: checklist
    command: speckit.checklist
    integration: "{{ inputs.integration }}"
    input:
      args: "release-readiness"

  - id: review-promotions
    type: gate
    message: "Review the latest AI-SDLC promotion recommendations before closing the loop."
    options: [approve, reject]
    on_reject: abort
